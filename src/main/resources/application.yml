spring:
  application:
    name: votacao
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/votacao}
    username: ${DB_USERNAME:votacao}
    password: ${DB_PASSWORD:votacao}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
